version: "3.8"

services:
  # MongoDB - Main Database
  mongodb:
    image: mongo:latest
    container_name: fastapi_mongodb
    environment:
      MONGO_INITDB_DATABASE: fastapi_books
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastapi_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fastapi_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastapi_network

volumes:
  mongo_data:
  redis_data:

networks:
  fastapi_network:
    driver: bridge
